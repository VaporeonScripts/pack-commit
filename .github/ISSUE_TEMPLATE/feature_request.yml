name: Feature Request
description: Suggest an idea or improvement for pack-commit
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make pack-commit better? Fill this out.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Is your request related to a limitation or annoyance you've run into?
      placeholder: e.g. I have to manually re-run the script for each of my modpacks...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Additional context, screenshots, examples from other tools, etc.
    validations:
      required: false
